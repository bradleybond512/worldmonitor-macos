<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloomberg Terminal</title>
    <meta name="description" content="Bloomberg-style financial terminal with real-time news and market data" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      /* Critical: prevent flash of unstyled content */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #000; color: #e0e0e0; font-family: 'Courier New', 'Courier', monospace; overflow: hidden; }
      #app { height: 100%; display: flex; flex-direction: column; }
      .loading-screen {
        position: fixed; inset: 0; background: #000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #ff6b00; font-family: 'Courier New', monospace; font-size: 14px; z-index: 9999;
      }
      .loading-logo { font-size: 28px; font-weight: bold; letter-spacing: 4px; margin-bottom: 16px; }
      .loading-bar { width: 300px; height: 2px; background: #222; margin: 12px 0; overflow: hidden; }
      .loading-bar-fill { height: 100%; background: #ff6b00; animation: loading 1.5s ease-in-out infinite; }
      @keyframes loading { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
      .loading-text { color: #666; font-size: 11px; letter-spacing: 2px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading-screen" id="loading">
        <div class="loading-logo">◆ TERMINAL</div>
        <div class="loading-bar"><div class="loading-bar-fill"></div></div>
        <div class="loading-text">INITIALIZING MARKET DATA...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
